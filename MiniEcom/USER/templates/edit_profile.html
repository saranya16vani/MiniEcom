{% extends "base.html" %}
{% block content %}
<h2>Edit Profile</h2>
<form method="post" class="card p-4 shadow-sm">
  {% csrf_token %}
  <div class="mb-3">
    <label>Email</label>
    <input type="email" name="email" value="{{ profile.user.email }}" class="form-control">
  </div>
  <div class="mb-3">
    <label>Phone Number</label>
    <input type="text" name="phone_number" value="{{ form.instance.phone_number }}" class="form-control">
  </div>
  <div class="mb-3">
    <label>Address</label>
    <textarea name="address" class="form-control">{{ form.instance.address }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
{% endblock %}
