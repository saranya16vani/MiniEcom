{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
  {% if product.image %}
    <img src="{{ product.image.url }}" class="card-img-top">
  {% endif %}
  <div class="card-body">
    <h2>{{ product.name }}</h2>
    <p>{{ product.description }}</p>
    <p><strong>Price:</strong> ₹{{ product.price }}</p>
    <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">Add to Cart</a>
  </div>
</div>
{% endblock %}
