{% extends "base.html" %}
{% block content %}
<h2>Recently Viewed Products</h2>
<div class="row">
  {% for product in products %}
    <div class="col-md-3">
      <div class="card mb-3 shadow-sm">
        {% if product.image %}
          <img src="{{ product.image.url }}" class="card-img-top">
        {% endif %}
        <div class="card-body">
          <h5>{{ product.name }}</h5>
          <a href="{% url 'product_detail' product.id %}" class="btn btn-primary btn-sm">View</a>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
